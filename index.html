<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Momocat 莫猫 (中国官网)</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fbfbfd;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
            color: #1d1d1f;
            --rubber-card-gap: clamp(16px, 2vw, 24px);
            --rubber-section-padding: clamp(16px, 3vw, 32px);
        }

        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(10px, 2vw, 12px) clamp(16px, 3vw, 24px);
            background-color: rgba(251, 251, 253, 0.65);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 0.8px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-title {
            font-weight: 700;
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            letter-spacing: -0.02em;
            color: #1d1d1f;
            padding: clamp(6px, 1.5vw, 8px) clamp(20px, 4vw, 28px);
            border-radius: 40px;
            min-height: 44px;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .main-content {
            position: fixed; top: 72px; left: 0; width: 100%; height: calc(100vh - 72px);
            overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; overscroll-behavior-y: contain;
            padding-bottom: calc(var(--rubber-section-padding) * 1.5);
        }
        .main-content::-webkit-scrollbar { display: none; }

        /* 海报 */
        .cover-card {
            width: 100%;
            background-color: #e0e0e5;
            padding: clamp(50px, 8vw, 80px) clamp(20px, 5vw, 40px);
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1d1d1f;
            min-height: clamp(320px, 40vw, 420px);
            border: 0 solid transparent;
            border-image: repeating-linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1, #a18cd1, #fbc2eb, #8fd3f4, #8fd3f4, #ff9a9e) 1;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05) inset, 0 0 20px rgba(160, 200, 255, 0.3), 0 0 40px rgba(200, 160, 255, 0.2);
        }
        .cover-card::before {
            content: ""; position: absolute; top: -50%; left: -20%; width: 140%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none; z-index: 1;
        }
        .cover-card::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg); animation: fullShine 5s ease-in-out infinite;
            pointer-events: none; z-index: 1; filter: blur(4px);
        }
        @keyframes fullShine {
            0% { left: -100%; opacity: 0; } 10% { opacity: 1; } 30% { left: 120%; opacity: 1; }
            40% { left: 120%; opacity: 0; } 100% { left: -100%; opacity: 0; }
        }
        .cover-top-left {
            position: absolute;
            top: clamp(20px, 3vw, 30px);
            left: clamp(20px, 3vw, 30px);
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-weight: 500;
            color: #86868b;
            letter-spacing: 1px;
            z-index: 4;
        }
        .cover-center {
            position: relative;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .cover-title {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #1d1d1f;
            margin-bottom: clamp(24px, 4vw, 36px);
            line-height: 1.1;
        }
        .card-btn {
            background: #0071e3;
            border: 1.5px solid #0071e3;
            color: #ffffff;
            padding: clamp(8px, 1.5vw, 12px) clamp(20px, 3vw, 28px);
            border-radius: 40px;
            font-weight: 500;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
        }
        .card-btn:hover { background: #005bb5; border-color: #005bb5; }

        /* 大卡片 */
        .content-inner { padding: var(--rubber-section-padding) var(--rubber-section-padding) 0; }
        .poster-card {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            background: #ffffff;
            border-radius: clamp(20px, 3vw, 28px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02), 0 8px 24px rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
            border: 0.5px solid rgba(0,0,0,0.04);
        }
        .poster-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.08); }

        .poster-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
        }
        .poster-novel-title {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1d1d1f;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .poster-tag {
            display: inline-block;
            background: #0D5C3A;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.2em 1em;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .poster-btn {
            position: absolute;
            bottom: clamp(16px, 3vw, 24px);
            right: clamp(16px, 3vw, 24px);
            background-color: #0071e3;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            white-space: nowrap;
            overflow: hidden;
            cursor: pointer;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .poster-btn:hover {
            width: auto;
            border-radius: 40px;
            padding: 0 24px;
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }
        .poster-btn span {
            display: none;
            margin-left: 4px;
        }
        .poster-btn:hover span {
            display: inline;
        }

        /* 兑换下载弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.35); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); z-index: 50; display: flex;
            align-items: center; justify-content: center; visibility: hidden; opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-dialog {
            background: white; border-radius: 28px; max-width: 620px; width: 90%; max-height: 85vh;
            box-shadow: 0 16px 32px rgba(0,0,0,0.12); position: relative; z-index: 51;
            display: flex; flex-direction: column; overflow: hidden; padding: 0;
        }
        .modal-close-btn {
            position: absolute; top: 16px; left: 16px; width: 36px; height: 36px;
            border-radius: 50%; background-color: #e5e5ea; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background-color 0.2s; z-index: 6;
        }
        .modal-close-btn:hover { background-color: #d1d1d6; }
        .modal-close-btn svg { width: 16px; height: 16px; stroke: #1d1d1f; stroke-width: 2; }
        .modal-content-area {
            overflow-y: auto; padding: 0; scrollbar-width: thin; scrollbar-color: #c8c8ce transparent; z-index: 1; flex: 1;
        }
        .redeem-input {
            width: 100%; padding: 12px 16px; border-radius: 40px; border: 1.2px solid rgba(0,0,0,0.15);
            font-family: inherit; font-size: 0.95rem; color: #1d1d1f; background: #fbfbfd;
            margin-top: 12px; outline: none; transition: border-color 0.2s;
        }
        .redeem-input:focus { border-color: #0071e3; }
        .redeem-btn {
            display: inline-block; background: transparent; border: 1.5px solid #0071e3; color: #0071e3;
            padding: 10px 24px; border-radius: 40px; font-weight: 500; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s ease; margin-top: 16px; white-space: nowrap;
        }
        .redeem-btn:hover { background-color: #0071e3; color: white; }
        .redeem-feedback { text-align: center; margin-top: 12px; font-size: 0.9rem; min-height: 24px; }
        .download-btn {
            display: flex; align-items: center; justify-content: center; width: 100%;
            padding: 16px 24px; margin-bottom: 12px; background: #f5f5f7;
            border: 1px solid rgba(0,0,0,0.08); border-radius: 20px; color: #1d1d1f;
            font-weight: 600; font-size: 1.15rem; text-decoration: none; transition: all 0.2s ease;
        }
        .download-btn:hover { background: #0071e3; color: white; border-color: #0071e3; }
        .download-btn small { display: block; font-weight: 400; font-size: 0.8rem; color: #6e6e73; }
        .download-btn:hover small { color: rgba(255,255,255,0.8); }

        /* 预告弹窗专用样式 */
        .trailer-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.35); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); z-index: 52; display: flex;
            align-items: center; justify-content: center; visibility: hidden; opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .trailer-modal-overlay.show { visibility: visible; opacity: 1; }
        .trailer-modal-dialog {
            background: white; border-radius: 28px; max-width: 800px; width: 90%; max-height: 85vh;
            box-shadow: 0 16px 32px rgba(0,0,0,0.12); position: relative; z-index: 53;
            display: flex; flex-direction: column; overflow: hidden; padding: 0;
        }
        .trailer-video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }
        .trailer-video-wrapper video {
            width: 100%;
            display: block;
        }
        /* 移除挡板层，不再需要 */
        .video-block-layer {
            display: none;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-title">Moc</div>
    </header>

    <div class="main-content" id="mainContent">
        <div class="cover-card" id="coverCard">
            <div class="cover-top-left">新Headline</div>
            <div class="cover-center">
                <h1 class="cover-title">线上活动</h1>
                <a href="#" class="card-btn" id="trailerBtn">查看预告</a>
            </div>
        </div>

        <div class="content-inner">
            <div class="poster-card" id="posterCard">
                <div class="poster-center">
                    <div class="poster-novel-title">三号线</div>
                    <div class="poster-tag">2016-2026</div>
                </div>
                <a href="#" class="poster-btn" id="trialReadBtn">
                    <span style="display:inline;">📥</span>
                    <span class="btn-text">试读</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 下载弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-dialog" id="modalDialog">
            <button class="modal-close-btn" id="modalCloseBtn">
                <svg viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <div class="modal-content-area" id="modalContentArea"></div>
        </div>
    </div>

    <!-- 预告弹窗 -->
    <div class="trailer-modal-overlay" id="trailerModalOverlay">
        <div class="trailer-modal-dialog" id="trailerModalDialog">
            <button class="modal-close-btn" id="trailerCloseBtn">
                <svg viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <div class="modal-content-area" id="trailerContentArea">
                <div style="padding: 40px 32px 32px; position: relative;">
                    <div class="modal-title-text" style="margin: 0 0 8px 0; padding: 0; font-weight:700; color:#1d1d1f; font-size:1.8rem;">线上活动</div>
                    <div style="color: #86868b; font-size:0.9rem; margin-bottom: 24px;">2026.5.30</div>
                    <div id="trailerVideoContainer">
                        <!-- 动态填充 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const SmoothScrollEngine = { init: function() {} };
            const RubberEngine = {
                breakpoints: { phone: 600, tablet: 1024, desktop: 1440 },
                currentDevice: 'desktop',
                init: function() { this._detectAndApply(); this._bindEvents(); },
                _detectAndApply: function() {
                    const width = window.innerWidth; const body = document.body;
                    body.classList.remove('rubber-phone', 'rubber-tablet', 'rubber-desktop', 'rubber-wide');
                    let device;
                    if (width < this.breakpoints.phone) { body.classList.add('rubber-phone'); device = 'phone'; }
                    else if (width < this.breakpoints.tablet) { body.classList.add('rubber-tablet'); device = 'tablet'; }
                    else if (width < this.breakpoints.desktop) { body.classList.add('rubber-desktop'); device = 'desktop'; }
                    else { body.classList.add('rubber-wide'); device = 'wide'; }
                    this.currentDevice = device;
                    body.setAttribute('data-rubber-device', device);
                },
                _bindEvents: function() {
                    let resizeTimer;
                    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => this._detectAndApply(), 100); });
                    window.addEventListener('orientationchange', () => { setTimeout(() => this._detectAndApply(), 50); });
                }
            };

            function init() {
                SmoothScrollEngine.init();
                RubberEngine.init();

                // 下载弹窗
                const trialReadBtn = document.getElementById('trialReadBtn');
                const modalOverlay = document.getElementById('modalOverlay');
                const modalCloseBtn = document.getElementById('modalCloseBtn');
                const modalDialog = document.getElementById('modalDialog');
                const contentArea = document.getElementById('modalContentArea');
                const validCodes = ['mcnstt039_d7', 'mcnstt039_e9', 'mcnstt039_q3', 'mcnstt039_a5'];

                function renderRedeemView() {
                    contentArea.innerHTML = `
                        <div style="padding: 40px 32px 32px; text-align: center;">
                            <div class="modal-title-text" style="margin: 0 0 24px; padding: 0; text-align: center;">请输入兑换码</div>
                            <input type="text" id="redeemInput" class="redeem-input" placeholder="在此处输入moc提供给你的兑换码" autocomplete="off">
                            <button id="redeemBtn" class="redeem-btn">确认兑换</button>
                            <div id="redeemFeedback" class="redeem-feedback"></div>
                        </div>
                    `;
                    const redeemInput = document.getElementById('redeemInput');
                    const redeemBtn = document.getElementById('redeemBtn');
                    const redeemFeedback = document.getElementById('redeemFeedback');
                    function handleRedeem() {
                        const val = redeemInput.value.trim();
                        if (validCodes.includes(val)) {
                            redeemFeedback.textContent = '✅ 兑换成功！';
                            redeemFeedback.style.color = '#34c759';
                            redeemInput.disabled = true;
                            redeemBtn.disabled = true;
                            redeemBtn.style.opacity = '0.5';
                            setTimeout(() => showDownloadView(), 600);
                        } else {
                            redeemFeedback.textContent = '❌ 兑换码无效，请重试。';
                            redeemFeedback.style.color = '#ff3b30';
                        }
                    }
                    redeemBtn.addEventListener('click', handleRedeem);
                    redeemInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleRedeem(); } });
                    setTimeout(() => redeemInput.focus(), 100);
                }

                function showDownloadView() {
                    modalDialog.style.maxWidth = '620px';
                    modalDialog.style.maxHeight = '85vh';
                    modalDialog.style.height = '';
                    contentArea.innerHTML = `
                        <div style="padding: 40px 32px 32px;">
                            <div class="modal-title-text" style="margin: 0 0 8px 0; padding: 0; text-align: center;">📥 下载《三号线》</div>
                            <p style="text-align: center; color: #6e6e73; margin-bottom: 28px; font-size: 0.95rem;">请点击下方按钮下载对应章节（docx格式）</p>
                            <a href="1.docx" class="download-btn" download>📖 第一章 · 末班车 <small>1.docx</small></a>
                            <a href="2.docx" class="download-btn" download>📖 第二章 · 红衣女人 <small>2.docx</small></a>
                            <a href="3.docx" class="download-btn" download>📖 第三章 · 十年前 <small>3.docx</small></a>
                        </div>
                    `;
                }

                function openModal(e) {
                    e.preventDefault();
                    modalDialog.style.maxWidth = '800px';
                    modalDialog.style.maxHeight = '85vh';
                    modalDialog.style.height = '';
                    renderRedeemView();
                    modalOverlay.classList.add('show');
                }
                function closeModal() { modalOverlay.classList.remove('show'); }

                trialReadBtn.addEventListener('click', openModal);
                modalCloseBtn.addEventListener('click', closeModal);
                modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });
                document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && modalOverlay.classList.contains('show')) closeModal(); });

                // 预告弹窗（有声音）
                const trailerBtn = document.getElementById('trailerBtn');
                const trailerOverlay = document.getElementById('trailerModalOverlay');
                const trailerCloseBtn = document.getElementById('trailerCloseBtn');
                const trailerVideoContainer = document.getElementById('trailerVideoContainer');
                const targetDate = new Date('2026-05-30T00:00:00');
                let currentVideo = null;

                function getVideoInfo() {
                    const now = new Date();
                    if (now < targetDate) {
                        return { file: 'pre.mp4', label: '活动预热中' };
                    } else if (now.toDateString() === targetDate.toDateString()) {
                        return { file: 'event.mp4', label: '活动进行中' };
                    } else {
                        return { file: 're.mp4', label: '活动回顾' };
                    }
                }

                function updateTrailerVideo() {
                    if (currentVideo) {
                        currentVideo.pause();
                        currentVideo.remove();
                        currentVideo = null;
                    }

                    const { file, label } = getVideoInfo();
                    trailerVideoContainer.innerHTML = `
                        <div class="trailer-video-wrapper">
                            <video src="${file}" autoplay playsinline loop style="width:100%; display:block; border-radius:16px;"></video>
                        </div>
                        <p style="text-align:center; margin-top:12px; color:#6e6e73; font-size:0.85rem;">${label} · ${file}</p>
                    `;

                    const video = trailerVideoContainer.querySelector('video');
                    if (video) {
                        currentVideo = video;
                        // 移除静音，允许声音
                        video.muted = false;
                        // 尝试播放
                        video.play().then(() => {
                            console.log('视频有声播放成功');
                        }).catch(err => {
                            console.warn('自动播放被浏览器拦截，可能需要用户点击。请检查音频策略。');
                        });
                        // 禁止键盘快进
                        video.addEventListener('keydown', e => e.preventDefault());
                    }
                }

                function openTrailer(e) {
                    e.preventDefault();
                    updateTrailerVideo();
                    trailerOverlay.classList.add('show');
                }

                function closeTrailer() {
                    if (currentVideo) {
                        currentVideo.pause();
                        currentVideo.remove();
                        currentVideo = null;
                    }
                    trailerOverlay.classList.remove('show');
                }

                trailerBtn.addEventListener('click', openTrailer);
                trailerCloseBtn.addEventListener('click', closeTrailer);
                trailerOverlay.addEventListener('click', function(e) { if (e.target === trailerOverlay) closeTrailer(); });
                document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && trailerOverlay.classList.contains('show')) closeTrailer(); });
            }

            window.addEventListener('load', init);
            window.RubberEngine = RubberEngine;
            window.SmoothScrollEngine = SmoothScrollEngine;
        })();
    </script>
</body>
</html>
